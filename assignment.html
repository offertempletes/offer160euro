<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment of Scope & Other Terms</title>
    <link rel="stylesheet" href="globe.css">
</head>
<body>
<section class="container">
    <!--header-->
    <div class="header">
        <img src="img/header.png" alt="Srishty Medical Header">
    </div>

    <!--mainSection-->
    <div class="main-section">
        <div class="scope-table">
            <table>
                <thead>
                    <tr>
                        <th colspan="3" class="table-title">Assignment of Scope & Other Terms</th>
                    </tr>
                    <tr>
                        <th style="width: 70%;">Scope</th>
                        <th style="width: 15%;" class="center-text">Scope of Vendor</th>
                        <th style="width: 15%;" class="center-text">Scope of Customer</th>
                    </tr>
                </thead>            
                <tbody id="table-assignment" class="textarea-list">
                    <tr>
                        <td><textarea class="textarea-1">Freight CIF Destination Port, Ocean Freighted, or as agreed or offered.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-2">Any additional MATERIAL required beyond scope of supply owing to customer's requirements, interim amendments, change of routing or re-routing, shall paid for extra at unit rates.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-3">Customs Duties, Levies, Clearance, Handling, Forwarding etc.</textarea></td>    
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-4">GST, Entry Taxes, Local Body Taxes, Sales Tax, VAT, GST, Service Tax, any Other Taxes, , loading and unloading at Site; provision of way-bill/entry form; etc</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-5">On-site Vendor's Office & Stores for vendor's use and storage of materials with adequate general lighting, air conditioner and ventilation with lockable door; with generator power back; at least 6 5/15A power points, with free and easy access and free electrical supply. Approximate size: 15mx10mx4m;</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-6">SNG Control Room' [SCR] Size Requirement is as per submitted drawing; adequate general lighting, air conditioner and ventilation with lockable door; standard furniture; with generator power back; live and active direct internet connection, Voice & Data connection, EPABX line and connected instruments/equipment, at least 6 5/15A power points, with free and easy access and free electrical supply.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-7">Power: Stabilized, Adequate and proper Supply and connection of 3-Phase, 400VAC, power through a disconnect to terminal with MCCB, cabling/grounding, per blower unit as per blower rating. Power during installations will be provided free of costs.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-8">UPS backed-up power points at strategic locations along with tube run of 5/15A standard - For power packs as per drawings with exact location identified during the process and course of tube run installations.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-9">PC & peripherals with original Windows for Control Room to be provided the by the customer [Monitor, Keyboard, Mouse, CPU, UPS, printer etc...] as per specifications.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-10">All Civil, MEP works including, Removal and replacement of existing walls, wall coverings, core-cut outs, ceilings, floor coverings, Civil finishing works as & if required. Trap door with size of 2x3 feet for all diverter's location. Supply of electrical supply during installations; scaffoldings, ladders, and other supports for difficult or inaccessible areas and locations. Detailed Civil and MEP requirements are available on request.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-11">Supply of detailed construction plans and coordination</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-12">Training session for Users will be provided, per request of the customer. Training session to engineer of the hospital will be provided for usage, day to day maintenance and trouble shooting, per request of the customer. The training sessions will be provided during handing over and commissioning. Further training sessions can be arranged on request at additional charges.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-13">Arrangements and Provisions for lodging of 3 – 6 installers at site / or costs of such Lodging for installation teams and engineers should be with basic amenities and humane with Standard ventilated room with adequate furniture, general lighting and common bath and toilet.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-14">Idle Charges will be paid by customer to Srishty Medical Pvt. Ltd.@ Rs 15,000 per day up to maximum of 7 days, thereafter the teams may be demobilized from the site and remobilization may be done with minimum 4 weeks' notice.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-15">Re-installation or re-work will be charged by the vendor and paid for by the customer @ Rs 3,300/- per meter for Tube run & Rs 5,000/- per stations + cost of additional materials as may be required.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-16">Estimated period and schedule of installation works, commissioning and handing over is clearly stated herein above. Any delays for any reasons not attributable to the vendor and may be attributable to the customer or customer’s other vendors / contractors / conditions then extension will be provided by the customer for this project without any application of any LD clause; however in an event where the project is delayed beyond reasonable time [example if the delay more than 3months beyond the schedule then the customer shall pay Srishty Medical Pvt. Ltd. a Project Delayment Fee of Rs 50,000/- per month for each month of delay or part thereof.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                    <tr>
                        <td><textarea class="textarea-17">Any other scope of work not mentioned herein.</textarea></td>
                        <td class="center-text"><input type="checkbox"></td>
                        <td class="center-text"><input type="checkbox"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!--footer-->
    <div class="footer">
        <img src="img/footer.png" alt="Srishty Medical Footer">
    </div>
</section>
</body>
</html>
